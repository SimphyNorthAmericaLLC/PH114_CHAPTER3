<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EXP_3_4_12.html</title>
<script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>

<style>
body {
    background-color: #1e1e1e;
    color: white;
    font-family: monospace;
    padding: 15px;
}

.editor {
    display: flex;
    border: 1px solid #444;
    height: 320px;
}

#lineNumbers {
    background: #111;
    color: #00ff00;
    padding: 10px 8px;
    margin: 0;
    text-align: right;
    overflow: hidden;
    white-space: pre;
}

#code {
    flex: 1;
    background: #111;
    color: white;
    border: none;
    padding: 10px;
    resize: none;
    overflow: auto;
    white-space: pre;
}

button {
    margin-top: 10px;
    padding: 8px 14px;
    background: #007acc;
    color: white;
    border: none;
    cursor: pointer;
}

#output {
    background: #111;
    padding: 10px;
    margin-top: 10px;
    min-height: 100px;
    white-space: pre-wrap;
}
</style>
</head>

<body>

<h3>EXP_3_4_12.html</h3>

<div class="editor">
<pre id="lineNumbers"></pre>
<textarea id="code" wrap="off">def simulate_pi_collisions(digits_of_pi):
    # Mass ratio: m1 / m2 = 100^(d - 1)
    m1 = 100**(digits_of_pi - 1)
    m2 = 1

    # Initial velocities
    v1 = -1.0  # m1 moving left
    v2 = 0.0   # m2 initially at rest

    count = 0

    while True:
        # Collision between m1 and m2
        if v1 < v2:
            # Elastic collision equations
            u1 = ((m1 - m2)*v1 + 2*m2*v2)/(m1 + m2)
            u2 = ((m2 - m1)*v2 + 2*m1*v1)/(m1 + m2)
            v1, v2 = u1, u2
            count += 1
        else:
            # Collision with wall (m2 hits wall and reverses)
            if v2 < 0:
                v2 = -v2
                count += 1
            else:
                # No more collisions will happen
                break

    return count

# Try it out
for d in range(1, 6):
    collisions = simulate_pi_collisions(d)
    print(f"Digits of π: {d}, Collisions: {collisions}")
</textarea>
</div>

<button onclick="runCode()">Run</button>

<div id="output"></div>

<script>
let pyodideReady = loadPyodide();
let pyodide;

const codeEl = document.getElementById("code");
const lineNumbers = document.getElementById("lineNumbers");

function updateLineNumbers() {
    const lines = codeEl.value.split("\n").length;
    let nums = "";
    for (let i = 1; i <= lines; i++) nums += i + "\n";
    lineNumbers.textContent = nums;
}

codeEl.addEventListener("input", updateLineNumbers);
codeEl.addEventListener("scroll", () => lineNumbers.scrollTop = codeEl.scrollTop);
updateLineNumbers();

async function runCode() {
    pyodide = await pyodideReady;

    document.getElementById("output").innerText = "Running...";

    try {
        await pyodide.runPythonAsync(`
import sys
from io import StringIO
sys.stdout = StringIO()
`);

        await pyodide.runPythonAsync(codeEl.value);

        let out = await pyodide.runPythonAsync("sys.stdout.getvalue()");
        document.getElementById("output").innerText = out;

    } catch(err) {
        document.getElementById("output").innerText = err;
    }
}
</script>

</body>
</html>
