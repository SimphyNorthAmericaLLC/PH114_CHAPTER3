
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EXP_3_4_6_quiz.html</title>
<style>
body {
    background-color: #1e1e1e;
    color: white;
    font-family: Arial, sans-serif;
}

.container {
    width: 650px;
    margin: 40px auto;
    background: #222;
    padding: 20px;
    border-radius: 8px;
}

.question {
    margin-bottom: 12px;
    font-weight: bold;
}

.option {
    margin: 5px 0;
}

.feedback {
    margin-top: 5px;
    font-weight: bold;
}

.correct { color: #00ff88; }
.incorrect { color: #ff4c4c; }
</style>
</head>

<body>

<div class="container">
<div id="quiz"></div>
<div id="finalScore" style="margin-top:20px; font-weight:bold;"></div>
</div>

<script>

const questions = [{"question": "The analytical solution for maximum compression D in terms of m, u, k is given by", "options": [{"text": "sqrt(mu^2 / (2k))", "correct": true}, {"text": "sqrt(mu^2 / k)", "correct": false}, {"text": "sqrt(mu / (2k))", "correct": false}, {"text": "sqrt(2mu^2 / k)", "correct": false}]}, {"question": "The percentage of the kinetic energy lost is", "options": [{"text": "50%", "correct": true}, {"text": "25%", "correct": false}, {"text": "90%", "correct": false}, {"text": "45%", "correct": false}]}];

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function renderQuiz() {
    const quizDiv = document.getElementById("quiz");
    quizDiv.innerHTML = "";

    questions.forEach((q, index) => {
        shuffle(q.options);
        const letters = "ABCD";

        const qBlock = document.createElement("div");

        const qTitle = document.createElement("div");
        qTitle.className = "question";
        qTitle.innerHTML = (index+1) + ". " + q.question;
        qBlock.appendChild(qTitle);

        q.options.forEach((opt, i) => {
            const optDiv = document.createElement("div");
            optDiv.className = "option";
            optDiv.innerHTML = `
                <label>
                    <input type="radio" name="q${index}" value="${i}" onclick="checkAnswer(${index}, ${i})">
                    ${letters[i]}) ${opt.text}
                </label>
            `;
            qBlock.appendChild(optDiv);
        });

        const feedbackDiv = document.createElement("div");
        feedbackDiv.id = "feedback" + index;
        feedbackDiv.className = "feedback";
        qBlock.appendChild(feedbackDiv);

        quizDiv.appendChild(qBlock);
    });
}

let score = 0;
let answered = new Array(questions.length).fill(false);

function checkAnswer(qIndex, optIndex) {
    const feedback = document.getElementById("feedback" + qIndex);

    if (!answered[qIndex]) {
        answered[qIndex] = true;

        if (questions[qIndex].options[optIndex].correct) {
            feedback.innerHTML = "✅ Correct!";
            feedback.className = "feedback correct";
            score++;
        } else {
            feedback.innerHTML = "❌ Incorrect.";
            feedback.className = "feedback incorrect";
        }
    }

    if (answered.every(a => a)) {
        document.getElementById("finalScore").innerHTML =
            "Final Score: " + score + " / " + questions.length;
    }
}

renderQuiz();

</script>

</body>
</html>
