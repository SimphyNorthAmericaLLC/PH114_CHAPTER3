
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EXP_3_3_7_quiz.html</title>
<style>
body {
    background-color: #1e1e1e;
    color: white;
    font-family: Arial, sans-serif;
}

.container {
    width: 650px;
    margin: 40px auto;
    background: #222;
    padding: 20px;
    border-radius: 8px;
}

.question {
    margin-bottom: 12px;
    font-weight: bold;
}

.option {
    margin: 5px 0;
}

.feedback {
    margin-top: 5px;
    font-weight: bold;
}

.correct { color: #00ff88; }
.incorrect { color: #ff4c4c; }
</style>
</head>

<body>

<div class="container">
<div id="quiz"></div>
<div id="finalScore" style="margin-top:20px; font-weight:bold;"></div>
</div>

<script>

const questions = [{"question": "The solution for the common speed is", "options": [{"text": "u = sqrt{ 2gh(m1 - m2) / (m1 + m2) }", "correct": true}, {"text": "u = sqrt{ 2gh(m1 + m2) / (m1 - m2) }", "correct": false}, {"text": "u = sqrt{ gh(m1 + m2) / (m1 - m2) }", "correct": false}, {"text": "u = sqrt{ gh(m1 + m2) / (m1 - m2) }", "correct": false}, {"text": "u = sqrt{ 2gh(m1 + m2) / m1 }", "correct": false}]}, {"question": "The initial height is about", "options": [{"text": "3.6 m", "correct": true}, {"text": "3.4 m", "correct": false}, {"text": "3.8 m", "correct": false}, {"text": "4.0 m", "correct": false}, {"text": "3.2 m", "correct": false}]}, {"question": "The common landing speed is about", "options": [{"text": "2.53", "correct": true}, {"text": "2.63", "correct": false}, {"text": "2.43", "correct": false}, {"text": "2.73", "correct": false}, {"text": "2.83", "correct": false}]}, {"question": "Pretend that the pulley was much larger in terms of mass and size and not abiding by the assumption of a \"dummy\" pulley which has been the case thus far. Then the landing speed would have been", "options": [{"text": "Smaller", "correct": true}, {"text": "Larger", "correct": false}, {"text": "The same", "correct": false}, {"text": "More info is required", "correct": false}]}];

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function renderQuiz() {
    const quizDiv = document.getElementById("quiz");
    quizDiv.innerHTML = "";

    questions.forEach((q, index) => {
        shuffle(q.options);
        const letters = "ABCDE";

        const qBlock = document.createElement("div");

        const qTitle = document.createElement("div");
        qTitle.className = "question";
        qTitle.innerHTML = (index+1) + ". " + q.question;
        qBlock.appendChild(qTitle);

        q.options.forEach((opt, i) => {
            const optDiv = document.createElement("div");
            optDiv.className = "option";
            optDiv.innerHTML = `
                <label>
                    <input type="radio" name="q${index}" value="${i}" onclick="checkAnswer(${index}, ${i})">
                    ${letters[i]}) ${opt.text}
                </label>
            `;
            qBlock.appendChild(optDiv);
        });

        const feedbackDiv = document.createElement("div");
        feedbackDiv.id = "feedback" + index;
        feedbackDiv.className = "feedback";
        qBlock.appendChild(feedbackDiv);

        quizDiv.appendChild(qBlock);
    });
}

let score = 0;
let answered = new Array(questions.length).fill(false);

function checkAnswer(qIndex, optIndex) {
    const feedback = document.getElementById("feedback" + qIndex);

    if (!answered[qIndex]) {
        answered[qIndex] = true;

        if (questions[qIndex].options[optIndex].correct) {
            feedback.innerHTML = "✅ Correct!";
            feedback.className = "feedback correct";
            score++;
        } else {
            feedback.innerHTML = "❌ Incorrect.";
            feedback.className = "feedback incorrect";
        }
    }

    if (answered.every(a => a)) {
        document.getElementById("finalScore").innerHTML =
            "Final Score: " + score + " / " + questions.length;
    }
}

renderQuiz();

</script>

</body>
</html>
