<div class="editor">
<pre id="lineNumbers"></pre>
<textarea id="code" wrap="off">import numpy as np
import matplotlib.pyplot as plt

import matplotlib
matplotlib.use("Agg")

plt.rcParams.update({
    'figure.facecolor': 'white',
    'axes.facecolor': 'white',
})

from scipy.integrate import odeint
import sympy as sp

def force(t):
    return 2 + 0.7 * t

friction_force_constant = 1 * 0.1 * 9.8  # constant friction force

def friction_force(speed):
    return friction_force_constant

def drag_force(speed):
    drag_coefficient = 0.05
    return drag_coefficient * speed**2

def acceleration(speed, t):
    net_force = force(t) - friction_force(speed) - drag_force(speed)
    return net_force

def velocity_and_position(y, t):
    speed, position = y
    dydt = [acceleration(speed, t), speed]
    return dydt

# Time points
t = sp.symbols('t')
t_values = np.linspace(0, 10, 1000)

# Symbolic solutions
speed_symbolic = sp.integrate(acceleration(t, sp.Symbol('t')), t)
position_symbolic = sp.integrate(speed_symbolic, t)

print("Symbolic Solution for Speed (m/s):")
print(speed_symbolic)
print("\nSymbolic Solution for Distance (m):")
print(position_symbolic)

# Initial conditions
initial_speed = 0.0  # m/s
initial_position = 0.0  # m
initial_state = [initial_speed, initial_position]

# Solve the differential equations
sol = odeint(velocity_and_position, initial_state, t_values)

speed = sol[:, 0]
position = sol[:, 1]

# Finding closest value to t=4s
index_t_4 = np.abs(t_values - 4).argmin()
speed_at_4 = speed[index_t_4]
position_at_4 = position[index_t_4]

print("\nSpeed at t=4s:", speed_at_4, "m/s")
print("Covered distance at t=4s:", position_at_4, "m")

# Plotting
plt.figure(figsize=(10, 6))
plt.subplot(2, 1, 1)
plt.plot(t_values, speed, 'b', label='Speed (m/s)')
plt.title('Speed vs Time')
plt.xlabel('Time (s)')
plt.ylabel('Speed (m/s)')
plt.grid(True)
plt.legend()

plt.subplot(2, 1, 2)
plt.plot(t_values, position, 'r', label='Position (m)')
plt.title('Distance vs Time')
plt.xlabel('Time (s)')
plt.ylabel('Position (m)')
plt.grid(True)
plt.legend()

plt.tight_layout()


plt.tight_layout()
plt.savefig("plot.png")
plt.savefig("plot.pdf")
plt.savefig("plot.svg")

<script>
let pyodideReady = loadPyodide();
let pyodide;

const code = document.getElementById("code");
const lineNumbers = document.getElementById("lineNumbers");

function updateLineNumbers() {
    const lines = code.value.split("\n").length;
    let numbers = "";
    for (let i = 1; i <= lines; i++) numbers += i + "\n";
    lineNumbers.textContent = numbers;
}

code.addEventListener("input", updateLineNumbers);
code.addEventListener("scroll", () => lineNumbers.scrollTop = code.scrollTop);
updateLineNumbers();

async function runCode() {
    pyodide = await pyodideReady;

    document.getElementById("output").innerText = "Running...";
    document.getElementById("plot").src = "";

    await pyodide.loadPackage(["numpy","matplotlib","scipy","sympy"]);

    try {
        await pyodide.runPythonAsync(`
import sys
from io import StringIO
sys.stdout = StringIO()
`);

        await pyodide.runPythonAsync(code.value);
        let output = await pyodide.runPythonAsync("sys.stdout.getvalue()");
        document.getElementById("output").innerText = output;

        let img = pyodide.FS.readFile("plot.png", {encoding:"binary"});
        let blob = new Blob([img], {type:"image/png"});
        document.getElementById("plot").src = URL.createObjectURL(blob);

    } catch(err) {
        document.getElementById("output").innerText = err;
    }
}

function downloadPlot(format) {
    try {
        let file = pyodide.FS.readFile("plot." + format, {encoding:"binary"});
        let blob = new Blob([file], {type:"application/octet-stream"});
        let link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "plot." + format;
        link.click();
    } catch(err) {
        alert("Run the code successfully first.");
    }
}
</script>
