<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Energy, Work & Systems Quiz — Restart on Wrong</title>
<style>
  body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; line-height: 1.45; margin: 0; padding: 24px; background: #0b0b0b; color: #f2f2f2; }
  #quiz2 { max-width: 760px; margin: 0 auto; }
  #q2_stem { margin: .5rem 0 1rem; font-size: 1.05rem; }
  #q2_options { display: grid; gap: .5rem; }
  .q2_option { border: 1px solid #333; border-radius: 10px; padding: .6rem .8rem; cursor: pointer; text-align: left; background:#121212; }
  .q2_option:hover { background: #161616; }
  #q2_feedback { margin-top: .9rem; min-height: 1.2rem; color:#aaa; }
  #q2_nav { margin-top: 1rem; display: flex; gap: .6rem; }
  button { padding: .55rem .9rem; border-radius: 10px; border: 1px solid #333; background: #1b1b1b; color: #f2f2f2; cursor: pointer; }
</style>
</head>
<body>
  <div id="quiz2">
    <h3 id="q2_progress"></h3>
    <div id="q2_stem"></div>
    <div id="q2_options"></div>
    <div id="q2_feedback"></div>
    <div id="q2_nav">
      <button id="q2_restart" style="margin-left:auto;">Restart</button>
    </div>
  </div>

<script>
/* Exact wording preserved in stems. Option order shown as provided (no shuffling). */
const quiz2 = [
  {
    stem: "A box has initial kinetic energy and moves on a rough surface with friction coefficient k. When the box comes to a full stop, the total amount of heat which will be released from the conversion of kinetic energy will be ____dependent on k a) be b) not be c) more information is needed",
    choices: ["be","not be","more information is needed"],
    correctIndex: 1
  },
  {
    stem: "A box has initial kinetic energy and moves along on a rough horizontal surface with friction coefficient k. When the box comes to a full stop, the total distance covered will only be dependent on a) the initial energy b) the initial energy and k c) k only cd) none of these apply",
    choices: ["the initial energy","the initial energy and k","k only","none of these apply"],
    correctIndex: 1
  },
  {
    stem: "A projectile is launched at an angle. At the top of its trajectory, its kinetic energy is a) minimum but not zero, zero b) maximum c) exactly half than the initial",
    choices: ["minimum but not zero, zero","maximum","exactly half than the initial"],
    correctIndex: 0
  },
  {
    stem: "A box is moving with speed V along a horizontal smooth surface (no friction) and compresses by a distance X a spring of constant K. Based on the conservation of energy, X depends on a) V and K b) K only c) V only d) None of these",
    choices: ["V and K","K only","V only","None of these"],
    correctIndex: 0
  },
  {
    stem: "A box is moving with speed V along a horizontal smooth surface (no friction) and compresses by a distance X a spring of constant K. Based on the conservation of energy, the spring's potential energy will be a) dependent of K, b) independent of K c) more information is needed",
    choices: ["dependent of K","independent of K","more information is needed"],
    correctIndex: 1
  },
  {
    stem: "An object slides (from rest) down an inclined plane of angle Z with no friction. The speed at the bottom of the plane is a) dependent on Z, independent of Z, b) more information is needed.",
    choices: ["dependent on Z","independent of Z","more information is needed"],
    correctIndex: 1
  },
  {
    stem: "A projectile is launched from the ground at an angle. The mechanical (kinetic + potential due to height) energy of the projectile when friction is absent is conserved at any point of its trajectory. Is this statement a) true, b) false, or c) more information is needed?",
    choices: ["true","false","more information is needed"],
    correctIndex: 0
  },
  {
    stem: "An object of mass m1 lies on a horizontal surface with friction and is connected with a massless and inextensible string to a pulley from which another less massive object m2 (m1>m2) is hanging vertically. The accelerations of m1 and m2 will be a) a1=a2> 0, b) a1>a2, c) a1< a2, or d) a1=a2= 0.",
    choices: ["a1=a2> 0","a1>a2","a1< a2","a1=a2= 0"],
    correctIndex: 0
  },
  {
    stem: "A cart is pulled by a vertically hanging weight via a simple pulley. The speed of the cart depends on: a) only the mass of the hanging weight, b) only the mass of the cart, c) both the mass of the cart and the mass of the hanging weight, d) nothing. Masses have nothing to do with the cart’s speed.",
    choices: ["only the mass of the hanging weight","only the mass of the cart","both the mass of the cart and the mass of the hanging weight","nothing. Masses have nothing to do with the cart’s speed"],
    correctIndex: 2
  },
  {
    stem: "The work that it takes to push a box straight up to a height H along an inclined smooth surface is A (in Joules), and the energy it takes to push the same box through zig-zag to the same height H is B (also in Joules). These works are related as a) A> B, b)A=B, c)B> A, or none of these.",
    choices: ["A> B","A=B","B> A","none of these"],
    correctIndex: 1
  },
  {
    stem: "A box has initial kinetic energy and climbs on a smooth inclined surface of angle Z. When the box comes to a full stop, the net height difference covered will only be dependent on a) the initial energy only, b) the initial energy, and Z only, c) none of these apply.",
    choices: ["the initial energy only","the initial energy, and Z only","none of these apply"],
    correctIndex: 0
  },
  {
    stem: "A box has initial kinetic energy and climbs on a rough inclined surface of angle Z with friction coefficient k. When the box comes to a full stop, the total distance covered along the inlined surface will only be dependent on a) the initial energy, k, and Z, b) k and Z only, c) none of these apply.",
    choices: ["the initial energy, k, and Z","k and Z only","none of these apply"],
    correctIndex: 0
  },
  {
    stem: "A box has initial kinetic energy and climbs a smooth inclined plane. The net height that the box will climb on the plane depends only on a) its initial speed and angle of the plane, c) its initial speed, angle of the plane, and mass of the box, d) none of these.",
    choices: ["its initial speed and angle of the plane","its initial speed, angle of the plane, and mass of the box","none of these"],
    correctIndex: 2
  }
];

const els = {
  progress: document.getElementById('q2_progress'),
  stem: document.getElementById('q2_stem'),
  options: document.getElementById('q2_options'),
  feedback: document.getElementById('q2_feedback'),
  restart: document.getElementById('q2_restart'),
};

let idx = 0;
let score = 0;

function render() {
  const total = quiz2.length;
  els.progress.textContent = `Question ${idx+1} of ${total}  ·  Score: ${score}/${total}`;
  els.stem.textContent = quiz2[idx].stem;
  els.options.innerHTML = '';
  els.feedback.textContent = '';

  const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  quiz2[idx].choices.forEach((text, i) => {
    const btn = document.createElement('button');
    btn.className = 'q2_option';
    btn.type = 'button';
    btn.innerHTML = `<strong>${letters[i]})</strong> ${text}`;
    btn.addEventListener('click', () => handleChoice(i));
    els.options.appendChild(btn);
  });
}

function handleChoice(i) {
  const correct = quiz2[idx].correctIndex;
  if (i === correct) {
    score++;
    els.feedback.textContent = 'Correct.';
    setTimeout(() => {
      idx++;
      if (idx < quiz2.length) {
        render();
      } else {
        els.progress.textContent = `Completed · Final Score: ${score}/${quiz2.length}`;
        els.stem.textContent = 'Quiz finished.';
        els.options.innerHTML = '';
        els.feedback.textContent = 'Press Restart to try again.';
      }
    }, 600);
  } else {
    els.feedback.textContent = 'Incorrect — restarting from Question 1…';
    setTimeout(() => { idx = 0; score = 0; render(); }, 700);
  }
}

els.restart.addEventListener('click', () => { idx = 0; score = 0; render(); });
render();
</script>
</body>
</html>
