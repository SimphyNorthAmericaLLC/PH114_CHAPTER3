
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CH3_EXIT_QUIZ_B.html</title>
<style>
body {
    background-color: #1e1e1e;
    color: white;
    font-family: Arial, sans-serif;
}
.container {
    width: 650px;
    margin: 40px auto;
    background: #222;
    padding: 20px;
    border-radius: 8px;
}
.question { margin-bottom: 12px; font-weight: bold; }
.option { margin: 5px 0; }
.feedback { margin-top: 5px; font-weight: bold; }
.correct { color: #00ff88; }
.incorrect { color: #ff4c4c; }
</style>
</head>
<body>
<div class="container">
<div id="quiz"></div>
<div id="finalScore" style="margin-top:20px; font-weight:bold;"></div>
</div>
<script>
const questions = [{"question": "A box has initial kinetic energy and moving on a rough surface with friction coefficient k. When the box comes to a full stop, the total amount of heat which will be released from the conversion of kinetic energy will ____dependent on k", "choices": ["be", "not be", "more information is needed"], "correct": 1}, {"question": "A box has initial kinetic energy and moves along on a rough horizontal surface with friction coefficient k. When the box comes to a full stop, the total distance covered will only be dependent on", "choices": ["the initial energy", "the initial energy and k", "k only", "none of these apply"], "correct": 1}, {"question": "A projectile is launched at an angle. At the top of its trajectory, its kinetic energy is", "choices": ["minimum but not zero", "zero", "maximum", "exactly half than the initial"], "correct": 0}, {"question": "A box is moving with speed V along a horizontal smooth surface (no friction) and compresses by a distance X a spring of constant K. Based on the conservation of energy, X depends on", "choices": ["V and K", "K only", "V only", "None of these"], "correct": 0}, {"question": "A box is moving with speed V along a horizontal smooth surface (no friction) and compresses by a distance X a spring of constant K. Based on the conservation of energy, the spring's potential energy will be", "choices": ["dependent of K", "independent of K", "more information is needed"], "correct": 1}, {"question": "An object slides (from rest) down an inclined plane of angle Z with no friction. The speed at the bottom of the plane is", "choices": ["dependent on Z", "independent of Z", "more information is needed"], "correct": 1}, {"question": "A projectile is launched from the ground at an angle. The mechanical energy is conserved. Is this statement", "choices": ["true", "false", "more information is needed"], "correct": 0}, {"question": "An object of mass m1 lies on a horizontal surface with friction connected to m2. The accelerations will be", "choices": ["a1=a2>0", "a1>a2", "a1<a2", "a1=a2=0"], "correct": 0}, {"question": "A cart is pulled by a vertically hanging weight via a simple pulley. The speed depends on:", "choices": ["only hanging mass", "only cart mass", "both masses", "nothing"], "correct": 2}, {"question": "Work pushing box straight up vs zig-zag to same height H:", "choices": ["A>B", "A=B", "B>A", "none of these"], "correct": 1}];
function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}
function renderQuiz() {
    const quizDiv = document.getElementById("quiz");
    quizDiv.innerHTML = "";
    questions.forEach((q, index) => {
        shuffle(q.choices);
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const qBlock = document.createElement("div");
        const qTitle = document.createElement("div");
        qTitle.className = "question";
        qTitle.innerHTML = (index+1) + ". " + q.question;
        qBlock.appendChild(qTitle);
        q.choices.forEach((choice, i) => {
            const optDiv = document.createElement("div");
            optDiv.className = "option";
            optDiv.innerHTML = `
                <label>
                    <input type="radio" name="q${index}" value="${i}" onclick="checkAnswer(${index}, '${choice}')">
                    ${letters[i]}) ${choice}
                </label>
            `;
            qBlock.appendChild(optDiv);
        });
        const feedbackDiv = document.createElement("div");
        feedbackDiv.id = "feedback" + index;
        feedbackDiv.className = "feedback";
        qBlock.appendChild(feedbackDiv);
        quizDiv.appendChild(qBlock);
    });
}
let score = 0;
let answered = new Array(questions.length).fill(false);
function checkAnswer(qIndex, selectedText) {
    const feedback = document.getElementById("feedback" + qIndex);
    if (!answered[qIndex]) {
        answered[qIndex] = true;
        const correctText = questions[qIndex].choices[questions[qIndex].correct];
        if (selectedText === correctText) {
            feedback.innerHTML = "✅ Correct!";
            feedback.className = "feedback correct";
            score++;
        } else {
            feedback.innerHTML = "❌ Incorrect.";
            feedback.className = "feedback incorrect";
        }
    }
    if (answered.every(a => a)) {
        document.getElementById("finalScore").innerHTML =
            "Final Score: " + score + " / " + questions.length;
    }
}
renderQuiz();
</script>
</body>
</html>
