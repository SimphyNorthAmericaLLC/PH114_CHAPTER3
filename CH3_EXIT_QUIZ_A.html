
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CH3_EXIT_QUIZ_A.html</title>
<style>
body {
    background-color: #1e1e1e;
    color: white;
    font-family: Arial, sans-serif;
}
.container {
    width: 650px;
    margin: 40px auto;
    background: #222;
    padding: 20px;
    border-radius: 8px;
}
.question { margin-bottom: 12px; font-weight: bold; }
.option { margin: 5px 0; }
.feedback { margin-top: 5px; font-weight: bold; }
.correct { color: #00ff88; }
.incorrect { color: #ff4c4c; }
</style>
</head>
<body>
<div class="container">
<div id="quiz"></div>
<div id="finalScore" style="margin-top:20px; font-weight:bold;"></div>
</div>
<script>
const questions = [{"question": "A box has initial kinetic energy and moving on a rough surface with friction coefficient k. When the box comes to a full stop, the total amount of heat which will be released from the conversion of kinetic energy will ____dependent on k", "options": [{"text": "be", "correct": false}, {"text": "not be", "correct": true}, {"text": "more information is needed", "correct": false}]}, {"question": "A box has initial kinetic energy and moves along on a rough horizontal surface with friction coefficient k. When the box comes to a full stop, the total distance covered will only be dependent on", "options": [{"text": "the initial energy and k", "correct": true}, {"text": "k only", "correct": false}, {"text": "more information is needed", "correct": false}]}, {"question": "A projectile is launched at an angle. At the top of its trajectory, its kinetic energy is", "options": [{"text": "minimum but not zero", "correct": true}, {"text": "zero", "correct": false}, {"text": "maximum", "correct": false}, {"text": "exactly half than the initial", "correct": false}]}, {"question": "A box is moving with speed V along a horizontal smooth surface (no friction) and compresses by a distance X a spring of constant K. Based on the conservation of energy, X depends on", "options": [{"text": "V and K", "correct": true}, {"text": "K only", "correct": false}, {"text": "V only", "correct": false}, {"text": "None of these", "correct": false}]}, {"question": "A box is moving with speed V along a horizontal smooth surface (no friction) and compresses by a distance X a spring of constant K. Based on the conservation of energy, the spring's potential energy will be", "options": [{"text": "dependent on K", "correct": false}, {"text": "independent of K", "correct": true}, {"text": "more information is needed", "correct": false}]}, {"question": "An object slides (from rest) down an inclined plane of angle Z with no friction. The speed at the bottom of the plane is", "options": [{"text": "dependent on Z", "correct": false}, {"text": "independent of Z", "correct": true}, {"text": "more information is needed", "correct": false}]}, {"question": "A projectile is launched from the ground at an angle. The mechanical (kinetic + potential due to height) energy of the projectile when friction is absent is conserved at any point of its trajectory. Is this statement", "options": [{"text": "true", "correct": true}, {"text": "false", "correct": false}, {"text": "more information is needed", "correct": false}]}, {"question": "An object of mass m1 lies on a horizontal surface with friction and is connected with a massless and inextensible string to a pulley from which another less massive object m2 (m1>m2) is hanging vertically. The accelerations of m1 and m2 will be", "options": [{"text": "a1=a2>0", "correct": true}, {"text": "a1>a2", "correct": false}, {"text": "a1<a2", "correct": false}, {"text": "a1=a2=0", "correct": false}]}, {"question": "A cart is pulled by a vertically hanging weight via a simple pulley. The speed of the cart depends on:", "options": [{"text": "only the mass of the hanging weight", "correct": false}, {"text": "only the mass of the cart", "correct": false}, {"text": "both the mass of the cart and the mass of the hanging weight", "correct": true}, {"text": "nothing. Masses have nothing to do with the cart\u2019s speed", "correct": false}]}, {"question": "The work that it takes to push a box straight up to a height H along an inclined smooth surface is A (in Joules) and the energy the it takes to push the same box through zig-zag to the same height H is B (also in Joules). These works are related as", "options": [{"text": "A>B", "correct": false}, {"text": "A=B", "correct": true}, {"text": "B>A", "correct": false}, {"text": "none of these", "correct": false}]}, {"question": "A box has initial kinetic energy and climbs on a rough inclined surface of angle Z with friction coefficient k. When the box comes to a full stop, the net height difference covered will only be dependent on", "options": [{"text": "the initial energy and k", "correct": true}, {"text": "k and Z only", "correct": false}, {"text": "more information is needed", "correct": false}]}, {"question": "A box has initial kinetic energy and climbs on a rough inclined surface of angle Z with friction coefficient k. When the box comes to a full stop, the total distance covered on the inlined surface will only be dependent on", "options": [{"text": "the initial energy, Z and k", "correct": true}, {"text": "k and Z only", "correct": false}, {"text": "more information is needed", "correct": false}]}, {"question": "Two boxes collide on a frictionless horizontal surface and move as one aka plastic collision. The system ______momentum and ________kinetic energy", "options": [{"text": "conserves, conserves", "correct": false}, {"text": "conserves, does not conserve", "correct": true}, {"text": "does not conserve, does not conserve", "correct": false}, {"text": "none of these apply", "correct": false}]}, {"question": "During the collision of unknown restitution between two objects on a smooth inclined surface the kinetic energy of the two object system before, during and after the collision is", "options": [{"text": "conserved", "correct": false}, {"text": "not conserved", "correct": true}, {"text": "more information is needed", "correct": false}]}, {"question": "A ball is bouncing vertically on the ground with restitution of about 0.5. The system's ball+ground kinetic energy is conserved", "options": [{"text": "before during and after the collision", "correct": false}, {"text": "before the collision", "correct": false}, {"text": "during the collision", "correct": true}, {"text": "after the collision", "correct": false}, {"text": "none of the apply", "correct": false}]}, {"question": "A box is sliding down a smooth wedge that can also move on a frictionless horizontal surface. The total energy (kinetic+potential) of the box as it slides down", "options": [{"text": "is conserved", "correct": false}, {"text": "is not conserved", "correct": true}]}, {"question": "A box is sliding down a smooth wedge that can also move on a frictionless horizontal surface. The total energy (kinetic+potential) of the box+wedge system", "options": [{"text": "is conserved", "correct": true}, {"text": "is not conserved", "correct": false}]}];
function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}
function renderQuiz() {
    const quizDiv = document.getElementById("quiz");
    quizDiv.innerHTML = "";
    questions.forEach((q, index) => {
        shuffle(q.options);
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const qBlock = document.createElement("div");
        const qTitle = document.createElement("div");
        qTitle.className = "question";
        qTitle.innerHTML = (index+1) + ". " + q.question;
        qBlock.appendChild(qTitle);
        q.options.forEach((opt, i) => {
            const optDiv = document.createElement("div");
            optDiv.className = "option";
            optDiv.innerHTML = `
                <label>
                    <input type="radio" name="q${index}" value="${i}" onclick="checkAnswer(${index}, ${i})">
                    ${letters[i]}) ${opt.text}
                </label>
            `;
            qBlock.appendChild(optDiv);
        });
        const feedbackDiv = document.createElement("div");
        feedbackDiv.id = "feedback" + index;
        feedbackDiv.className = "feedback";
        qBlock.appendChild(feedbackDiv);
        quizDiv.appendChild(qBlock);
    });
}
let score = 0;
let answered = new Array(questions.length).fill(false);
function checkAnswer(qIndex, optIndex) {
    const feedback = document.getElementById("feedback" + qIndex);
    if (!answered[qIndex]) {
        answered[qIndex] = true;
        if (questions[qIndex].options[optIndex].correct) {
            feedback.innerHTML = "✅ Correct!";
            feedback.className = "feedback correct";
            score++;
        } else {
            feedback.innerHTML = "❌ Incorrect.";
            feedback.className = "feedback incorrect";
        }
    }
    if (answered.every(a => a)) {
        document.getElementById("finalScore").innerHTML =
            "Final Score: " + score + " / " + questions.length;
    }
}
renderQuiz();
</script>
</body>
</html>
